<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>BB Touch v2.4.0</title>
<style>
:root{--bg:#071124;--card:#101a31;--card2:#0b1428;--line:#26385f;--text:#edf4ff;--muted:#aab6cf;--accent:#27c8ff;--good:#80f0bb;--warn:#ffd36b;--bad:#ff8e8e}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#071124,#0a1225);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}header{position:sticky;top:0;background:rgba(7,17,36,.92);backdrop-filter:blur(12px);z-index:5;border-bottom:1px solid var(--line);padding:14px 18px}h1{font-size:24px;margin:0}small{color:var(--muted)}main{padding:16px;max-width:980px;margin:auto}.card{background:rgba(16,26,49,.95);border:1px solid var(--line);border-radius:20px;padding:16px;margin:0 0 16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid{grid-template-columns:1fr}}label{display:block;color:var(--muted);font-size:14px;margin:10px 0 6px}input,select,button,textarea{font:inherit}input,select,textarea{width:100%;padding:14px 15px;border-radius:14px;border:1px solid #31456f;background:#091329;color:var(--text);outline:none}button{border:0;border-radius:16px;padding:15px 18px;font-weight:800;background:linear-gradient(90deg,#6fd6ff,#88efb5);color:#06111e;width:100%;margin-top:12px}.ghost{background:#0b1428;color:var(--text);border:1px solid var(--line)}.previewWrap{display:grid;grid-template-columns:minmax(0,1fr) minmax(260px,.9fr);gap:12px;align-items:start}@media(max-width:760px){.previewWrap{grid-template-columns:1fr}.stickyCheck{position:sticky;top:62px;z-index:4}}img{max-width:100%;border-radius:14px;border:1px solid var(--line);background:#000}.slot{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:center;margin:7px 0}.slot b{color:var(--muted);font-size:13px}.slot input{padding:10px 12px;border-radius:12px}.pillbox{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.pill{border:1px solid #365384;background:#0b1428;color:var(--text);border-radius:12px;padding:8px 10px;font-weight:700}.pill.excluded{opacity:.42}.note{color:var(--muted);line-height:1.55}.warn{color:var(--warn)}.bad{color:var(--bad)}.good{color:var(--good)}.result{border:1px solid #22c5ff;border-radius:18px;padding:16px;margin:12px 0;background:#0b1428}.result .title{color:var(--muted);font-size:14px}.result .num{font-size:40px;font-weight:900;letter-spacing:.02em;margin:6px 0}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}.ocrText{max-height:230px;overflow:auto;background:#071022;border:1px solid var(--line);border-radius:14px;padding:12px;color:#dbe7ff}.mini{font-size:12px;color:var(--muted)}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.debug{display:none}.showDebug .debug{display:block}</style>
</head>
<body>
<header><h1>BB Touch <small>v2.4.0</small></h1><small>画像は外部送信しません。OCRはこのブラウザ内で実行します。</small></header>
<main>
  <section class="card">
    <div class="grid">
      <div>
        <label>期間</label><input id="period" inputmode="numeric" value="21">
      </div>
      <div>
        <label>σ倍率</label><select id="sigmaMult"><option value="2" selected>2σ</option><option value="3">3σ</option></select>
      </div>
    </div>
    <label>チャート画像</label>
    <input id="imageInput" type="file" accept="image/*">
    <button id="ocrBtn" class="ghost">画像OCRを実行</button>
    <div id="status" class="note" style="margin-top:10px">画像を選んでOCRを実行してください。</div>
  </section>

  <section class="card">
    <h2>画像とOCR認識値の確認</h2>
    <div class="previewWrap">
      <div><img id="preview" alt="preview" style="display:none"></div>
      <div class="stickyCheck">
        <div class="note">画像の表示値と下の認識値が合っているか確認。違う場合は直接修正してから「計算する」。</div>
        <div class="slot"><b>現在値</b><input id="price" inputmode="decimal" placeholder="例 199.794"></div>
        <div class="slot"><b>基準線/SMA</b><input id="sma" inputmode="decimal" placeholder="例 201.423"></div>
        <div class="slot"><b>+2σ</b><input id="plus2" inputmode="decimal" placeholder="例 204.318"></div>
        <div class="slot"><b>-2σ</b><input id="minus2" inputmode="decimal" placeholder="例 198.528"></div>
        <div class="slot"><b>+3σ</b><input id="plus3" inputmode="decimal" placeholder="任意"></div>
        <div class="slot"><b>-3σ</b><input id="minus3" inputmode="decimal" placeholder="任意"></div>
        <button id="calcBtn">計算する</button>
        <button id="clearBtn" class="ghost">クリア</button>
      </div>
    </div>
  </section>

  <section class="card">
    <h2>OCRテキスト</h2>
    <div id="ocrText" class="ocrText mono">未実行</div>
    <button id="extractBtn" class="ghost">OCRテキストから再抽出</button>
    <h3>数値候補</h3>
    <div id="candidates" class="pillbox"></div>
    <p class="mini">候補をタップすると、現在値 → SMA → +2σ → -2σ → +3σ → -3σ の空欄に順番に入ります。</p>
  </section>

  <section class="card">
    <h2>結果</h2>
    <div id="results" class="note">まだ計算していません。</div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
